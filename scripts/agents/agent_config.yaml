model:
  temperature: 0.2
  max_tokens: 768
  requests_per_minute: 0
  reasoning_effort: medium

runtime:
  backend: openshell_worker
  add_base_tools: true
  use_structured_outputs_internally: true
  code_block_tags: markdown
  additional_authorized_imports:
    - math
    - statistics
    - json
    - re
    - collections
    - itertools
    - pathlib
    - typing
    - rdkit

security:
  allowed_tool_hosts:
    - 127.0.0.1
    - localhost
    - api.openai.com
    - openrouter.ai
    - api.together.xyz
  allow_network_tools: false
  enforce_container_network_isolation: true

sandbox:
  executor_type: openshell
  openshell:
    gateway_name: spectralix
    gateway_port: 18080
    gateway_plaintext: true
    auto_start_gateway: true
    sandbox_name: spectralix-runtime
    sandbox_from: base
    ready_timeout_seconds: 180
    delete_on_close: false
    native_codex:
      sandbox_name: spectralix-codex-runtime
      sandbox_from: codex
      codex_bin: codex
      codex_home_dir: /sandbox/.codex
      upload_auth_from: ~/.codex/auth.json

tools:
  profiles:
    no_tools: []
    tools:
      - chem_format_tool
      - smiles_sanity_tool
      - unit_convert_tool
      - rubric_hint_tool
      - json_array_validate_tool
      - chem_python_tool
    tools_internet:
      - chem_format_tool
      - smiles_sanity_tool
      - unit_convert_tool
      - rubric_hint_tool
      - json_array_validate_tool
      - chem_python_tool
      - safe_http_get_tool
    minimal:
      []
    full:
      - chem_format_tool
      - smiles_sanity_tool
      - unit_convert_tool
      - rubric_hint_tool
      - json_array_validate_tool
      - chem_python_tool
  mcp:
    enabled: false
    servers: []
