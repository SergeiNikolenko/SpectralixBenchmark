schema_version: v2
files:
  level_a:
    path: benchmark/level_a.jsonl
    records: 2240288
    sources:
      - pmechdb_manual_test_challenging
      - pmechdb_combinatorial_test
      - uspto_50k_test
      - chemu_ner_train_dev
      - choriso_public
      - weave2_public
    coverage:
      - transformation_type
      - reaction_center
      - reagent_roles
      - mechanistic_class
      - stereochemical_outcome_partial
  level_b:
    path: benchmark/level_b.jsonl
    records: 3372962
    sources:
      - orderly_retro_test
      - paroutes_selected_reactions_all
    coverage:
      - precursor_set
      - disconnection_hint
      - structural_constraints
  level_c:
    path: benchmark/level_c.jsonl
    records: 20013
    sources:
      - paroutes_n1_reference_routes
      - paroutes_n5_reference_routes
      - benchmark_v1_0 strict route-planning subset
    coverage:
      - route_depth
      - branch_handling
      - convergence
      - key_intermediates_partial
notes:
  - paths under files.* refer to generated large pools used during benchmark construction; they are not tracked in the public repository.
  - difficulty and coverage_tags are now first-class fields on every record.
  - level_a and level_b are large agent pools, not paper-ready eval subsets.
  - mechanistic_class/selectivity remain incomplete and need curated eval-layer annotation.
  - benchmark taxonomy reporting remaps reagent and condition role tasks into auxiliary suite G.
  - legacy level fields remain for runtime compatibility; planning_horizon and task_mode are added at materialization time.
